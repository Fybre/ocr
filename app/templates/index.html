{% extends "base.html" %}
{% block title %}Upload Document — OCR Service{% endblock %}

{% block content %}
<div x-data="uploader()" class="max-w-2xl mx-auto">
  <h1 class="text-2xl font-bold mb-6">Process Document</h1>

  <!-- Drop zone -->
  <div
    class="border-2 border-dashed rounded-xl p-10 text-center cursor-pointer transition-colors"
    :class="dragging ? 'border-blue-500 bg-blue-500/10' : 'border-gray-600 hover:border-gray-500'"
    @dragover.prevent="dragging = true"
    @dragleave.prevent="dragging = false"
    @drop.prevent="onDrop($event)"
    @click="$refs.fileInput.click()"
  >
    <svg class="w-12 h-12 mx-auto text-gray-500 mb-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
    </svg>
    <p class="text-gray-300 font-medium">Drag & drop a file here, or click to browse</p>
    <p class="text-sm text-gray-500 mt-1">PDF, JPEG, PNG, TIFF, WEBP</p>
    <input type="file" x-ref="fileInput" class="hidden" accept=".pdf,.jpg,.jpeg,.png,.tiff,.tif,.webp"
           @change="onFileSelected($event)" />
  </div>

  <!-- Selected file -->
  <div x-show="file" x-cloak class="mt-3 flex items-center gap-2 text-sm text-gray-300 bg-gray-800 rounded-lg px-4 py-2">
    <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
    </svg>
    <span x-text="file?.name" class="truncate flex-1"></span>
    <button @click="file = null" class="text-gray-500 hover:text-red-400">✕</button>
  </div>

  <!-- Options -->
  <div class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1">Processing mode</label>
      <select x-model="mode" class="w-full rounded-lg border border-gray-600 bg-gray-800 text-gray-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="auto">Auto-detect</option>
        <option value="machine">Machine printed</option>
        <option value="handwriting">Handwriting</option>
        <option value="image_description">Image description</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1">Output format</label>
      <select x-model="outputFormat" class="w-full rounded-lg border border-gray-600 bg-gray-800 text-gray-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="plain">Plain text</option>
        <option value="markdown">Markdown</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1">LLM provider</label>
      <select x-model="llmProvider" class="w-full rounded-lg border border-gray-600 bg-gray-800 text-gray-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="auto">Auto (use available)</option>
        <option value="local" {% if not has_local %}disabled class="text-gray-600"{% endif %}>Local (Ollama){% if not has_local %} — not configured{% endif %}</option>
        <option value="openai" {% if not has_openai %}disabled class="text-gray-600"{% endif %}>OpenAI{% if not has_openai %} — not configured{% endif %}</option>
        <option value="azure" {% if not has_azure %}disabled class="text-gray-600"{% endif %}>Azure OpenAI{% if not has_azure %} — not configured{% endif %}</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-300 mb-1">Languages (Tesseract)</label>
      <input x-model="languages" type="text" placeholder="eng" class="w-full rounded-lg border border-gray-600 bg-gray-800 text-gray-100 placeholder-gray-500 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <p class="text-xs text-gray-500 mt-1">Comma-separated codes, e.g. eng,fra</p>
    </div>
  </div>

  <!-- Submit -->
  <button
    @click="submit()"
    :disabled="!file || loading"
    class="mt-6 w-full bg-blue-600 text-white rounded-lg px-6 py-3 font-medium hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
  >
    <svg x-show="loading" class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
    </svg>
    <span x-text="loading ? 'Processing…' : 'Process Document'"></span>
  </button>

  <!-- Error -->
  <div x-show="error" x-cloak class="mt-4 rounded-lg bg-red-900/40 border border-red-700 p-4 text-sm text-red-300" x-text="error"></div>
</div>

<script src="/static/js/uploader.js"></script>
{% endblock %}
