<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}OCR Service{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <header class="bg-gray-900 border-b border-gray-700 px-6 py-4 flex items-center gap-3">
    <svg class="w-7 h-7 text-blue-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
    </svg>
    <a href="/" class="flex flex-col leading-tight">
      <span class="text-xl font-semibold tracking-tight">OCR Service</span>
      <span class="text-sm text-gray-400 font-normal">Extract text from computer generated or handwritten documents, or get descriptions of images</span>
    </a>
    <nav class="ml-auto flex gap-4 text-sm text-gray-400">
      <a href="/" class="hover:text-gray-100">Upload</a>
      <a href="/health" target="_blank" class="hover:text-gray-100">Health</a>
    </nav>
  </header>
  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
